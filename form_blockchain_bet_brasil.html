<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Apostas</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f2f2f2; }
        form { max-width: 400px; margin: auto; padding: 20px; background: #fff; border-radius: 5px; }
        label { display: block; margin-bottom: 5px; }
        input, button { width: 100%; padding: 10px; margin-bottom: 15px; }
        button { background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <form action="registrar_aposta.php" method="POST">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="carteira_eth">Carteira ETH:</label>
        <input type="text" id="carteira_eth" name="carteira_eth" required>

        <label for="prognosticos">Prognósticos (separados por vírgula):</label>
        <input type="text" id="prognosticos" name="prognosticos" required>

        <button type="submit">Registrar Aposta</button>
    </form>
</body>
</html>
